name: Deploy to EC2

# Trigger this workflow every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Run Docker Container
    # CRITICAL: This tells GitHub to run these commands on YOUR EC2 server, not theirs!
    runs-on: self-hosted 

    steps:
      - name: 1. Grab the code from GitHub
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 3. Install DVC and S3 Plugin
        run: pip install dvc dvc-s3

      - name: 4. Configure AWS for DVC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{secrets.AWS_REGION}} # <-- CHANGE THIS to your actual bucket's region!

      - name: 5. Download the heavy model from S3
        run: dvc pull

      - name: 6. Build the Docker Image
        run: sudo docker build -t nyc-taxi-api .

      - name: 7. Remove the old container (if it is currently running)
        run: |
          sudo docker stop taxi-container || true
          sudo docker rm taxi-container || true

      - name: 8. Start the new container!
        run: sudo docker run -d --name taxi-container -p 8080:8080 nyc-taxi-api